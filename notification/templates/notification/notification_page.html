<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Jumbotron Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      /* Custom styles to match the screenshot exactly */
      .bg-custom-dark {
        background-color: #212529; /* Deep charcoal */
      }
      .text-pink {
        color: #d63384; /* Matches the code snippet color */
      }
      .btn-primary-custom {
        background-color: #0d6efd;
        border: none;
      }
      .btn-outline-custom {
        color: #6c757d;
        border-color: #495057;
      }
      .btn-outline-custom:hover {
        background-color: #495057;
        color: #fff;
      }
      .alert {
        border-radius: 0;
      }
    </style>
  </head>
  <body>

    <div id="notification">

    </div>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Navbar</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Link</a>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                Dropdown
              </a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Action</a></li>
                <li><a class="dropdown-item" href="#">Another action</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#">Something else here</a></li>
              </ul>
            </li>
            <li class="nav-item">
              <a class="nav-link disabled" aria-disabled="true">Disabled</a>
            </li>
          </ul>
          <form class="d-flex" role="search">
            <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
            <button class="btn btn-outline-success" type="submit">Search</button>
          </form>
        </div>
      </div>
    </nav>

    <div class="container my-5">
      <div class="p-5 text-center bg-custom-dark text-white rounded-4 shadow-lg">
        
        <div class="mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" fill="#7952b3" class="bi bi-bootstrap-reboot" viewBox="0 0 16 16" style="background: #7952b3; border-radius: 20%; padding: 15px; color: white;">
            <path d="M1.161 8a6.84 6.84 0 1 0 6.842-6.84.58.58 0 1 1 0-1.16 8 8 0 1 1-6.556 3.412l-.663-.577a.58.58 0 0 1 .227-.997l2.52-.69a.58.58 0 0 1 .728.633l-.332 2.592a.58.58 0 0 1-.956.364l-.643-.56A6.8 6.8 0 0 0 1.16 8z"/>
            <path d="M6.641 11.671V8.843h1.57l1.498 2.828h1.314L9.439 8.56c.744-.183 1.209-.743 1.209-1.591 0-1.137-.856-1.819-2.328-1.819H5.444v6.521h1.197zm0-3.923V6.23h1.72c.713 0 1.158.396 1.158.999 0 .574-.404.92-1.24.92h-1.638z"/>
          </svg>
        </div>

        <h1 class="display-5 fw-bold mb-3">Jumbotron with icon</h1>
        
        <div class="col-lg-7 mx-auto">
          <p class="lead mb-4 text-secondary">
            This is a custom jumbotron featuring an SVG image at the top, some longer text that wraps early thanks to a responsive <code class="text-pink">.col-*</code> class, and a customized call to action.
          </p>
          
          <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
            <button type="button" class="btn btn-primary btn-lg px-5 rounded-pill btn-primary-custom">
              Call to action &rarr;
            </button>
            <button type="button" class="btn btn-outline-secondary btn-lg px-5 rounded-pill btn-outline-custom">
              Secondary link
            </button>
          </div>
        </div>

      </div>
    </div>
  <script>
    const websocketProtocol = window.location.protocol === "https:" ? "wss" : "ws";
    const wsEndpoint = `${websocketProtocol}://${window.location.host}/ws/notification/`;
    const socket = new WebSocket(wsEndpoint);
    let isPageUnloading = false;

    // Connection Open
    socket.onopen = function () {
      console.log("WebSocket connection established");
    };

    // Connection Closed
    socket.onclose = function (event) {
      // Refresh/navigation closes the current socket; treat that as normal.
      if (isPageUnloading || event.code === 1000 || event.code === 1001) {
        return;
      }
      console.warn("WebSocket connection closed unexpectedly", event);
    };

    window.addEventListener("beforeunload", function () {
      isPageUnloading = true;
      if (socket.readyState === WebSocket.OPEN) {
        socket.close(1000, "Page unloading");
      }
    });

    // Receive Message
    socket.addEventListener("message", function (event) {
      const messageData = JSON.parse(event.data);
      if (messageData.type !== "notification") {
        return;
      }
      console.log("Received Notification:", messageData.message);
      showNotification(messageData.message);
    });

    function showNotification(message) {
      const notificationContainer = document.getElementById("notification");

      const alertDiv = document.createElement("div");
      alertDiv.classList.add(
        "alert",
        "alert-dismissible",
        "alert-primary",
        "fade",
        "show",
        "mb-0"
      );
      alertDiv.setAttribute("role", "alert");
      const messageText = document.createElement("span");
      messageText.textContent = message;
      alertDiv.appendChild(messageText);

      const closeButton = document.createElement("button");
      closeButton.setAttribute("type", "button");
      closeButton.classList.add("btn-close");
      closeButton.setAttribute("data-bs-dismiss", "alert");
      closeButton.setAttribute("aria-label", "Close");

      alertDiv.appendChild(closeButton);
      notificationContainer.appendChild(alertDiv);

      // Auto remove after 5 seconds (optional clean UX)
      setTimeout(() => {
        alertDiv.remove();
      }, 5000);
    }
  </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
